spring.application.name=dge-api-intermed-lab
server.servlet.context-path=/api
server.port=9001
api.version=1.0
api.base.service.url=
spring.datasource.url=jdbc:postgresql://localhost:5432/bd_dge_emprego
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# BD tertiary (db_igrp_dge)
spring.datasource.tertiary.url=jdbc:postgresql://localhost:5432/db_dge_global
spring.datasource.tertiary.username=postgres
spring.datasource.tertiary.password=postgres
spring.datasource.tertiary.driver-class-name=org.postgresql.Driver

#spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

### FLYWAY CONFIGURATIONS
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
server.error.whitelabel.enabled=false
logging.level.org.flywaydb=INFO
logging.level.cv.dge.dge_api_rvcc=DEBUG
#base api  
api.base.service.url=http://localhost:8083/api
server.tomcat.max-part-count=200
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

##dados doc 
document.acolhimento.app-code=interm_laboral
document.acolhimento.tipo-relacao=EMPREGO_T_DETALHES_ACOLHIMENTO
document.acolhimento.estado=A
